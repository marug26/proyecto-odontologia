services:
  postgres:
    image: postgres:17
    container_name: odontologia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user-db
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: odontologiadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user-db -d odontologiadb"]
      interval: 5s
      timeout: 5s
      retries: 5

  dbmate:
    image: ghcr.io/amacneil/dbmate:2.27.0
    container_name: odontologia-dbmate
    command: ["up"]
    volumes:
      - ./compose/migrations:/db/migrations
    environment:
      DATABASE_URL: postgres://user-db:pass123@postgres:5432/odontologiadb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
