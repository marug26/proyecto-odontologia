spring:
  application:
    name: odontologiaDemo

  datasource:
    url: jdbc:postgresql://localhost:5432/odontologiadb
    username: user-db
    password: pass123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        jdbc:
          lob:
            "[non_contextual_creation]": true
    open-in-view: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    "[com.odontologia]": DEBUG
    "[org.springframework.security]": DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    "[com.odontologia]": INFO
    "[org.springframework.security]": INFO
